<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="index.css" rel="stylesheet" />
    <link rel="icon" href="https://i.pinimg.com/564x/e3/e9/f3/e3e9f39b3ffbc791a10a0de265f36fc9.jpg" />
    <title>Rumi Axolotl</title>
</head>

<body>
    <div class="header"> 
    <h2>
        Today is: <time><span id="datetime"></span></time>
    </h2>
    <script>
        var dt = new Date();
        document.getElementById("datetime").innerHTML = dt.toLocaleDateString();
    </script>
    
    <!-- Display the countdown timer in an element -->
    <div class="countdown">
        <span id="day"></span><span id="hour"></span>h <span id="minute"></span>m
        <span id="second"></span>s
    </div>
    <h2>
        Countdown to NEWYEAR!
    </h2>
    
    
    
    </div>
    <div class="profile">
        <div class="top">
            <div class="avatar">
                <img class="pic" src="https://media.giphy.com/media/GOPutjEbvhBHmH455X/giphy.gif" />
            </div>
            <div class="name">
                <p class="p1">Rumi Axolotl</p>
            </div>
        </div>
        <div class="bottom">
            <div class="message">
                <p class="p2"> You can contact me with:</p>
            </div>
            <div class="contact">
                <div class="icon">
                    <a href="https://github.com/RumiAxolotl">
                        <p class="p3">Github</p>
                        <img class="icon-pic"
                            src="https://iconsplace.com/wp-content/uploads/_icons/ff309a/256/png/github-icon-256.png" />

                    </a>

                </div>
                <div class="icon">
                    <a href="https://www.facebook.com/Lumi.120602/">
                        <p class="p3">Facebook</p>
                        <img class="icon-pic"
                            src="https://iconsplace.com/wp-content/uploads/_icons/ff009c/256/png/facebook-icon-12-256.png" />
                    </a>
                </div>
                <div class="icon">
                    <a href="https://www.instagram.com/lumi_1206/">
                        <p class="p3">Instagram</p>
                        <img class="icon-pic"
                            src="https://iconsplace.com/wp-content/uploads/_icons/ff00c7/256/png/instagram-icon-256.png" />
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <h2>
        <a href="https://rumiaxolotl.github.io/poems/">
            Click here to read my poems!
        </a>
        </h2>
    </div>
</body>
<script>
    // Set the date we're counting down to
    var countDownDate = new Date("Jan 1, 2022 0:0:0+7UTC").getTime();

    // Update the count down every 1 second
    var x = setInterval(function () {
        // Get today's date and time
        var now = new Date().getTime();

        // Find the distance between now and the count down date
        var distance = countDownDate - now;

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Display the result in the element with id="demo"
        document.getElementById("day").innerHTML = days + " days ";
        document.getElementById("hour").innerHTML = hours;
        document.getElementById("minute").innerHTML = minutes;
        document.getElementById("second").innerHTML = seconds;

        // If the count down is finished, write some text
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("count").innerHTML = "HAPPY NEW YEAR!!";
        }
    }, 1000);
</script>
</html>
